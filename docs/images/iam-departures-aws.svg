<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980" role="img" aria-labelledby="title desc">
  <title id="title">IAM departures remediation · AWS flagship workflow</title>
  <desc id="desc">Vertical AWS-only IAM departures remediation workflow. HR data and IAM snapshots feed a security data lake. A reconciler reads the lake, filters rehires and grace-period cases, and writes an actionable S3 manifest. S3 object creation triggers EventBridge, which starts a Step Function. The Step Function invokes a parser Lambda and then a worker Lambda. The worker applies scoped AWS IAM cleanup only inside AWS. Every action is written to DynamoDB and audit S3, and the audit export feeds back into the security data lake for the next reconciler run. Azure and GCP use their own native orchestration stacks; this SVG shows the shipped AWS path only.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b17"/>
      <stop offset="100%" stop-color="#0a1325"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="65%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1e293b" stroke-opacity="0.22" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#64748b"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#f472b6"/>
    </marker>

