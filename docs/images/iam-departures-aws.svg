  </defs>

  <rect width="1100" height="980" fill="url(#bg)"/>
  <rect width="1100" height="980" fill="url(#grid)"/>
  <rect width="1100" height="980" fill="url(#glow)"/>

  <g font-family="Inter, Segoe UI, ui-sans-serif, Arial, sans-serif">
    <g transform="translate(56,42)">
      <rect x="0" y="0" width="176" height="30" rx="15" fill="#2a1708" stroke="#f59e0b"/>
      <use href="#aws" x="12" y="7" width="16" height="16"/>
      <text x="40" y="20" fill="#fbbf24" font-size="11" font-weight="800" letter-spacing="1.4">AWS FLAGSHIP WRITE PATH</text>
    </g>
    <text x="56" y="116" font-size="38" font-weight="900" fill="#f8fafc">IAM departures remediation</text>
    <text x="56" y="148" fill="#94a3b8" font-size="17">Scope in the lake, export the actionable set, let S3 trigger the workflow, then write and audit in AWS.</text>

    <!-- Stage cards -->
    <g transform="translate(56,188)">
      <rect x="0" y="0" width="988" height="170" rx="20" fill="#0b1628" stroke="#22d3ee"/>
      <text x="28" y="34" fill="#67e8f9" font-size="12" font-weight="800" letter-spacing="1.5">1 · PLAN IN THE SECURITY DATA LAKE</text>
      <text x="28" y="58" fill="#f8fafc" font-size="16" font-weight="700">HR and IAM data land first; the reconciler decides scope before anything can write.</text>

      <rect x="28" y="86" width="260" height="56" rx="14" fill="#0b1a2e" stroke="#22d3ee"/>
      <text x="50" y="110" fill="#e0f2fe" font-size="14" font-weight="800">Security data lake</text>
      <text x="50" y="130" fill="#94a3b8" font-size="12">HR exports · IAM snapshots · prior audit exports</text>

      <path d="M288,114 L350,114" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

      <rect x="350" y="86" width="280" height="56" rx="14" fill="#0b1a2e" stroke="#22d3ee"/>
      <text x="372" y="110" fill="#e0f2fe" font-size="14" font-weight="800">Reconciler</text>
      <text x="372" y="130" fill="#94a3b8" font-size="12">rehire filter · grace checks · actionable set only</text>

      <path d="M630,114 L692,114" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

      <rect x="692" y="86" width="268" height="56" rx="14" fill="#0b2a1e" stroke="#34d399"/>
      <use href="#s3" x="710" y="102" width="22" height="22"/>
      <text x="744" y="110" fill="#d1fae5" font-size="14" font-weight="800">S3 actionable manifest</text>
      <text x="744" y="130" fill="#94a3b8" font-size="12">immutable export · object-created event source</text>
    </g>

    <g transform="translate(56,388)">
      <rect x="0" y="0" width="988" height="218" rx="20" fill="#0b1628" stroke="#60a5fa"/>
      <text x="28" y="34" fill="#93c5fd" font-size="12" font-weight="800" letter-spacing="1.5">2 · S3 EVENT STARTS THE GUARDED AWS WORKFLOW</text>
      <text x="28" y="58" fill="#f8fafc" font-size="16" font-weight="700">S3 does not invoke Lambda directly. EventBridge starts the Step Function, which gates parser then worker.</text>

      <rect x="28" y="88" width="216" height="56" rx="14" fill="#0f1d36" stroke="#60a5fa"/>
      <text x="46" y="112" fill="#dbeafe" font-size="14" font-weight="800">EventBridge rule</text>
      <text x="46" y="132" fill="#94a3b8" font-size="12">S3 ObjectCreated on manifest prefix</text>

      <path d="M244,116 L308,116" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

      <rect x="308" y="88" width="244" height="56" rx="14" fill="#0f1d36" stroke="#60a5fa"/>
      <text x="326" y="112" fill="#dbeafe" font-size="14" font-weight="800">Step Function</text>
      <text x="326" y="132" fill="#94a3b8" font-size="12">fan out per identity · retries · approvals</text>

      <path d="M430,144 L430,178" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

      <rect x="308" y="186" width="244" height="56" rx="14" fill="#2a1708" stroke="#fbbf24"/>
      <use href="#lambda" x="324" y="202" width="22" height="22"/>
      <text x="356" y="210" fill="#fef3c7" font-size="14" font-weight="800">Parser Lambda</text>
      <text x="356" y="230" fill="#94a3b8" font-size="12">re-check manifest, IAM state, and runtime guards</text>

      <path d="M430,242 L430,276" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>

      <rect x="308" y="284" width="244" height="56" rx="14" fill="#2a1708" stroke="#fbbf24"/>
      <use href="#lambda" x="324" y="300" width="22" height="22"/>
      <text x="356" y="308" fill="#fef3c7" font-size="14" font-weight="800">Worker Lambda</text>
      <text x="356" y="328" fill="#94a3b8" font-size="12">AWS-only scoped principal · cross-account STS</text>

      <rect x="616" y="138" width="344" height="144" rx="16" fill="#12112e" stroke="#a78bfa"/>
      <text x="638" y="164" fill="#c4b5fd" font-size="12" font-weight="800" letter-spacing="1.4">AWS IAM DELETION ORDER</text>
      <text x="638" y="192" fill="#ddd6fe" font-size="12">deactivate and delete keys · delete login profile</text>
      <text x="638" y="214" fill="#ddd6fe" font-size="12">remove groups · detach managed policies · delete inline policies</text>
      <text x="638" y="236" fill="#ddd6fe" font-size="12">deactivate and delete MFA · delete signing certs · delete SSH keys</text>
      <text x="638" y="258" fill="#ddd6fe" font-size="12">delete service creds · tag for audit · delete IAM user</text>

      <path d="M552,312 L616,232" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
    </g>

    <g transform="translate(56,636)">
      <rect x="0" y="0" width="988" height="188" rx="20" fill="#0b1628" stroke="#2dd4bf"/>
      <text x="28" y="34" fill="#5eead4" font-size="12" font-weight="800" letter-spacing="1.5">3 · AUDIT BACK INTO AWS, THEN FEED THE LAKE</text>
      <text x="28" y="58" fill="#f8fafc" font-size="16" font-weight="700">Worker actions write to DynamoDB and S3. Those audit exports flow back into the lake for the next reconciliation pass.</text>

      <rect x="28" y="92" width="248" height="58" rx="14" fill="#0b1b2e" stroke="#60a5fa"/>
      <use href="#dynamo" x="46" y="110" width="22" height="22"/>
      <text x="80" y="116" fill="#dbeafe" font-size="14" font-weight="800">DynamoDB audit</text>
      <text x="80" y="136" fill="#94a3b8" font-size="12">fast lookup for user, step, timestamp, replay state</text>

      <rect x="312" y="92" width="248" height="58" rx="14" fill="#0b2a1e" stroke="#34d399"/>
      <use href="#s3" x="330" y="110" width="22" height="22"/>
      <text x="364" y="116" fill="#d1fae5" font-size="14" font-weight="800">S3 audit export · KMS</text>
      <text x="364" y="136" fill="#94a3b8" font-size="12">immutable evidence, manifests, and worker logs</text>

      <path d="M560,121 L640,121" fill="none" stroke="#2dd4bf" stroke-width="2.5" marker-end="url(#arrowTeal)"/>

      <rect x="640" y="92" width="320" height="58" rx="14" fill="#0b3d3b" stroke="#2dd4bf"/>
      <text x="660" y="116" fill="#ccfbf1" font-size="14" font-weight="800">Security data lake ingest-back</text>
      <text x="660" y="136" fill="#94a3b8" font-size="12">audit rows and exports feed the next reconciler run and drift checks</text>

      <path d="M800,150 C800,186 520,186 520,212 C520,238 180,238 180,204" fill="none" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrowPink)"/>
      <text x="598" y="214" fill="#f9a8d4" font-size="12" font-weight="800">next run closes or flags drift</text>
    </g>

    <g transform="translate(56,856)">
      <rect x="0" y="0" width="988" height="74" rx="14" fill="#12112e" stroke="#64748b"/>
      <text x="22" y="28" fill="#f1f5f9" font-size="12" font-weight="800" letter-spacing="0.4">AWS is the shipped orchestration. Azure and GCP use equivalent native stacks, not this worker.</text>
      <text x="22" y="52" fill="#94a3b8" font-size="12">Azure pattern: Blob/Event Grid → Logic Apps or Durable Functions → Functions → Table/Cosmos + Blob. GCP pattern: GCS/Eventarc → Workflows → Cloud Run Jobs or Functions → Firestore + GCS. One cloud per worker stays the rule.</text>
    </g>
  </g>
</svg>
