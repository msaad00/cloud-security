name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check skills/ --config pyproject.toml
      - run: ruff format --check skills/

  test-iam-departures:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3 moto pytest
      - name: Run stable tests (parser + worker)
        working-directory: skills/iam-departures-remediation
        run: pytest tests/test_parser_lambda.py tests/test_worker_lambda.py -v -o "testpaths=tests"

  test-model-serving:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/model-serving-security
        run: pytest tests/ -v -o "testpaths=tests"

  test-gpu-cluster:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/gpu-cluster-security
        run: pytest tests/ -v -o "testpaths=tests"

  test-discover-environment:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/discover-environment
        run: pytest tests/ -v -o "testpaths=tests"

  agent-bom-code-scan:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install agent-bom
      - name: SAST scan — AI components, prompts, tools
        run: |
          agent-bom code skills/ -f json -o agent-bom-code.json || true
          echo "=== agent-bom code scan results ==="
          cat agent-bom-code.json 2>/dev/null || echo "No output produced"
      - name: Upload code scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-bom-code-scan
          path: agent-bom-code.json
          if-no-files-found: ignore

  agent-bom-skills-audit:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install agent-bom
      - name: Skills audit — trust, risk, provenance
        run: |
          agent-bom skills scan skills/ -f json -o skills-audit.json --verbose || true
          echo "=== agent-bom skills audit results ==="
          cat skills-audit.json 2>/dev/null || echo "No output produced"
      - name: Upload skills audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-bom-skills-audit
          path: skills-audit.json
          if-no-files-found: ignore

  agent-bom-fs-scan:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install agent-bom
      - name: Filesystem scan — packages, dependencies, CVEs
        run: |
          agent-bom fs skills/ -f json -o agent-bom-fs.json || true
          echo "=== agent-bom fs scan results ==="
          cat agent-bom-fs.json 2>/dev/null || echo "No output produced"
      - name: Upload fs scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-bom-fs-scan
          path: agent-bom-fs.json
          if-no-files-found: ignore

  validate-cloudformation:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install cfn-lint
      - run: cfn-lint skills/iam-departures-remediation/infra/cloudformation.yaml
      - run: cfn-lint skills/iam-departures-remediation/infra/cross_account_stackset.yaml

  validate-terraform:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"
      - run: cd skills/iam-departures-remediation/infra/terraform && terraform init -backend=false && terraform validate

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r skills/ -c pyproject.toml --severity-level medium || true
      - name: Check for hardcoded secrets
        run: |
          # Scan source code only (exclude tests — test fixtures use fake keys)
          ! grep -rn "AKIA[A-Z0-9]\{16\}" skills/*/src/ --include="*.py" || exit 1
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" skills/*/src/ --include="*.py" || exit 1
          ! grep -rn "ghp_[a-zA-Z0-9]\{36\}" skills/*/src/ --include="*.py" || exit 1
          echo "No hardcoded secrets found in source code"
