name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check skills/ --config pyproject.toml
      - run: ruff format --check skills/

  # ── compliance-cis-mitre/ ────────────────────────────────────────

  test-cspm-aws:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3 moto pytest
      - working-directory: skills/compliance-cis-mitre/cspm-aws-cis-benchmark
        run: pytest tests/ -v -o "testpaths=tests"

  test-cspm-gcp:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/compliance-cis-mitre/cspm-gcp-cis-benchmark
        run: pytest tests/ -v -o "testpaths=tests"

  test-cspm-azure:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/compliance-cis-mitre/cspm-azure-cis-benchmark
        run: pytest tests/ -v -o "testpaths=tests"

  test-k8s-security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/compliance-cis-mitre/k8s-security-benchmark
        run: pytest tests/ -v -o "testpaths=tests"

  test-container-security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/compliance-cis-mitre/container-security
        run: pytest tests/ -v -o "testpaths=tests"

  # ── remediation/ ─────────────────────────────────────────────────

  test-iam-departures:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3 moto pytest
      - working-directory: skills/remediation/iam-departures-remediation
        run: pytest tests/ -v -o "testpaths=tests"

  test-vuln-remediation:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3 moto pytest
      - working-directory: skills/remediation/vuln-remediation-pipeline
        run: pytest tests/ -v -o "testpaths=tests"

  # ── detection-engineering/ ───────────────────────────────────────

  test-detection-engineering:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: Run all detection-engineering skill tests
        run: |
          shopt -s nullglob
          ran=0
          for d in skills/detection-engineering/*/tests; do
            # skip the .templates/ directory by filtering on a non-dotfile parent
            parent=$(basename "$(dirname "$d")")
            [[ "$parent" == .* ]] && continue
            echo "=== $d ==="
            (cd "$(dirname "$d")" && pytest tests/ -v -o "testpaths=tests")
            ran=$((ran+1))
          done
          if [ "$ran" -eq 0 ]; then
            echo "No detection-engineering skills with tests yet (template-only)"
          fi

  # ── ai-infra-security/ ───────────────────────────────────────────

  test-model-serving:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/ai-infra-security/model-serving-security
        run: pytest tests/ -v -o "testpaths=tests"

  test-gpu-cluster:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/ai-infra-security/gpu-cluster-security
        run: pytest tests/ -v -o "testpaths=tests"

  test-discover-environment:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/ai-infra-security/discover-environment
        run: pytest tests/ -v -o "testpaths=tests"

  # ── agent-bom scans ──────────────────────────────────────────────

  agent-bom:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install agent-bom
      - name: Scan code for AI components
        run: agent-bom code skills/ -f json -o code-scan.json || true
      - name: Audit skill definitions
        run: agent-bom skills scan skills/ -f json -o skills-audit.json --verbose || true
      - name: Scan filesystem for packages and CVEs
        run: agent-bom fs skills/ -f json -o fs-scan.json || true
      - name: Scan IaC (CloudFormation + Terraform)
        run: |
          agent-bom iac \
            skills/remediation/iam-departures-remediation/infra/cloudformation.yaml \
            skills/remediation/iam-departures-remediation/infra/cross_account_stackset.yaml \
            skills/remediation/iam-departures-remediation/infra/terraform/main.tf \
            -f json -o iac-scan.json || true
      - name: Scan IaC (SARIF for code scanning)
        run: |
          agent-bom iac \
            skills/remediation/iam-departures-remediation/infra/cloudformation.yaml \
            skills/remediation/iam-departures-remediation/infra/cross_account_stackset.yaml \
            skills/remediation/iam-departures-remediation/infra/terraform/main.tf \
            -f sarif -o iac-scan.sarif || true
      - name: Normalise SARIF (handle agent-bom empty-result quirk)
        if: always()
        run: |
          python3 - <<'PY'
          import json, os
          path = "iac-scan.sarif"
          stub = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "agent-bom-iac", "version": "0.76.2", "informationUri": "https://github.com/msaad00/agent-bom"}},
                  "results": []
              }]
          }
          if not os.path.exists(path):
              json.dump(stub, open(path, "w"))
              print("wrote stub SARIF (file missing)")
          else:
              try:
                  doc = json.load(open(path))
              except Exception as e:
                  json.dump(stub, open(path, "w"))
                  print(f"wrote stub SARIF (json parse failed: {e})")
              else:
                  if not (isinstance(doc, dict) and "runs" in doc):
                      json.dump(stub, open(path, "w"))
                      print("wrote stub SARIF (not SARIF-shaped)")
                  else:
                      print(f"SARIF ok: {len(doc.get('runs', []))} runs")
          PY
      - name: Upload IaC SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: iac-scan.sarif
          category: agent-bom-iac
        continue-on-error: true
      - name: Print results summary
        if: always()
        run: |
          echo "=== Code Scan ==="    && cat code-scan.json    2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
          echo "=== Skills Audit ===" && cat skills-audit.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
          echo "=== FS Scan ==="      && cat fs-scan.json      2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
          echo "=== IaC Scan ==="     && cat iac-scan.json     2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-bom-results
          path: |
            code-scan.json
            skills-audit.json
            fs-scan.json
            iac-scan.json
            iac-scan.sarif
          if-no-files-found: ignore

  # ── IaC validation ───────────────────────────────────────────────

  validate-cloudformation:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install cfn-lint
      - run: cfn-lint skills/remediation/iam-departures-remediation/infra/cloudformation.yaml
      - run: cfn-lint skills/remediation/iam-departures-remediation/infra/cross_account_stackset.yaml

  validate-terraform:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"
      - run: cd skills/remediation/iam-departures-remediation/infra/terraform && terraform init -backend=false && terraform validate

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r skills/ -c pyproject.toml --severity-level medium || true
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA[A-Z0-9]\{16\}" skills/*/*/src/ --include="*.py" || exit 1
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" skills/*/*/src/ --include="*.py" || exit 1
          ! grep -rn "ghp_[a-zA-Z0-9]\{36\}" skills/*/*/src/ --include="*.py" || exit 1
          echo "No hardcoded secrets found in source code"
