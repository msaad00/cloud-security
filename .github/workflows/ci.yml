name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Lint + static analysis ──────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: ruff
      - run: ruff check skills/ tests/ mcp-server/ scripts/ --config pyproject.toml

  skill-contract:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
      - run: python scripts/validate_skill_contract.py

  safe-skill-bar:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: bandit pip-audit
      - run: python scripts/validate_safe_skill_bar.py
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA[A-Z0-9]\{16\}" skills/ mcp-server/ scripts/ --include="*.py" || exit 1
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" skills/ mcp-server/ scripts/ --include="*.py" || exit 1
          ! grep -rn "ghp_[a-zA-Z0-9]\{36\}" skills/ mcp-server/ scripts/ --include="*.py" || exit 1
          echo "No hardcoded secrets found in enforced paths"
      - name: Dependency vulnerability audit
        run: pip-audit "${{ github.workspace }}"

  security-scan:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: bandit
      - run: bandit -r skills/compliance-cis-mitre/cspm-aws-cis-benchmark skills/remediation/iam-departures-remediation mcp-server -c pyproject.toml --severity-level medium

  # ── Unit tests, grouped into category matrices ────────────────
  test-compliance:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    strategy:
      fail-fast: false
      matrix:
        skill:
          - cspm-aws-cis-benchmark
          - cspm-gcp-cis-benchmark
          - cspm-azure-cis-benchmark
          - k8s-security-benchmark
          - container-security
    name: test-compliance (${{ matrix.skill }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: boto3 moto pytest pytest-cov
      - working-directory: skills/compliance-cis-mitre/${{ matrix.skill }}
        run: pytest tests/ -v -o "testpaths=tests"

  test-remediation:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    strategy:
      fail-fast: false
      matrix:
        skill:
          - iam-departures-remediation
    name: test-remediation (${{ matrix.skill }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: boto3 moto pytest pytest-cov
      - working-directory: skills/remediation/${{ matrix.skill }}
        run: pytest tests/ -v -o "testpaths=tests"

  test-detection-engineering:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    strategy:
      fail-fast: false
      matrix:
        skill:
          - ingest-cloudtrail-ocsf
          - ingest-vpc-flow-logs-ocsf
          - ingest-guardduty-ocsf
          - ingest-security-hub-ocsf
          - ingest-gcp-audit-ocsf
          - ingest-azure-activity-ocsf
          - ingest-k8s-audit-ocsf
          - ingest-mcp-proxy-ocsf
          - detect-mcp-tool-drift
          - detect-privilege-escalation-k8s
          - detect-sensitive-secret-read-k8s
          - detect-lateral-movement-aws
          - convert-ocsf-to-sarif
          - convert-ocsf-to-mermaid-attack-flow
    name: test-detection-engineering (${{ matrix.skill }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: pytest pytest-cov
      - working-directory: skills/detection-engineering/${{ matrix.skill }}
        run: pytest tests/ -v -o "testpaths=tests"

  test-ai-infra-security:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    strategy:
      fail-fast: false
      matrix:
        skill:
          - model-serving-security
          - gpu-cluster-security
          - discover-environment
    name: test-ai-infra (${{ matrix.skill }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: pytest pytest-cov
      - working-directory: skills/ai-infra-security/${{ matrix.skill }}
        run: pytest tests/ -v -o "testpaths=tests"

  test-integration:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: pytest pytest-cov
      - run: pytest tests/integration/ mcp-server/tests/ -v -o "testpaths=tests"

  # ── IaC validation (CloudFormation + Terraform in one job) ─────
  validate-iac:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: cfn-lint
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.12.0"
      - name: cfn-lint — CloudFormation
        run: |
          cfn-lint skills/remediation/iam-departures-remediation/infra/cloudformation.yaml
          cfn-lint skills/remediation/iam-departures-remediation/infra/cross_account_stackset.yaml
      - name: terraform validate
        run: cd skills/remediation/iam-departures-remediation/infra/terraform && terraform init -backend=false && terraform validate

  # ── agent-bom scans (code + skills + fs + IaC with SARIF upload) ─
  agent-bom:
    runs-on: ubuntu-latest
    needs: [lint, skill-contract, safe-skill-bar]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: "3.11"
          packages: agent-bom
      - name: Scan code for AI components
        run: agent-bom code skills/ -f json -o code-scan.json || true
      - name: Audit skill definitions
        run: agent-bom skills scan skills/ -f json -o skills-audit.json --verbose || true
      - name: Scan filesystem for packages and CVEs
        run: agent-bom fs skills/ -f json -o fs-scan.json || true
      - name: Scan IaC (CloudFormation + Terraform)
        run: |
          agent-bom iac \
            skills/remediation/iam-departures-remediation/infra/cloudformation.yaml \
            skills/remediation/iam-departures-remediation/infra/cross_account_stackset.yaml \
            skills/remediation/iam-departures-remediation/infra/terraform/main.tf \
            -f json -o iac-scan.json || true
      - name: Scan IaC (SARIF for code scanning)
        run: |
          agent-bom iac \
            skills/remediation/iam-departures-remediation/infra/cloudformation.yaml \
            skills/remediation/iam-departures-remediation/infra/cross_account_stackset.yaml \
            skills/remediation/iam-departures-remediation/infra/terraform/main.tf \
            -f sarif -o iac-scan.sarif || true
      - name: Normalise SARIF (handle agent-bom empty-result quirk)
        if: always()
        run: |
          python3 - <<'PY'
          import json, os
          path = "iac-scan.sarif"
          stub = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "agent-bom-iac", "version": "0.76.2", "informationUri": "https://github.com/msaad00/agent-bom"}},
                  "results": []
              }]
          }
          if not os.path.exists(path):
              json.dump(stub, open(path, "w"))
              print("wrote stub SARIF (file missing)")
          else:
              try:
                  doc = json.load(open(path))
              except Exception as e:
                  json.dump(stub, open(path, "w"))
                  print(f"wrote stub SARIF (json parse failed: {e})")
              else:
                  if not (isinstance(doc, dict) and "runs" in doc):
                      json.dump(stub, open(path, "w"))
                      print("wrote stub SARIF (not SARIF-shaped)")
                  else:
                      print(f"SARIF ok: {len(doc.get('runs', []))} runs")
          PY
      - name: Upload IaC SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: iac-scan.sarif
          category: agent-bom-iac
        continue-on-error: true
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-bom-results
          path: |
            code-scan.json
            skills-audit.json
            fs-scan.json
            iac-scan.json
            iac-scan.sarif
          if-no-files-found: ignore
