name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check skills/ --config pyproject.toml
      - run: ruff format --check skills/

  test-iam-departures:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install boto3 moto pytest
      - name: Run stable tests (parser + worker)
        working-directory: skills/iam-departures-remediation
        run: pytest tests/test_parser_lambda.py tests/test_worker_lambda.py -v -o "testpaths=tests"

  test-model-serving:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/model-serving-security
        run: pytest tests/ -v -o "testpaths=tests"

  test-gpu-cluster:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/gpu-cluster-security
        run: pytest tests/ -v -o "testpaths=tests"

  test-discover-environment:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - working-directory: skills/discover-environment
        run: pytest tests/ -v -o "testpaths=tests"

  agent-bom:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install agent-bom
      - name: Scan code for AI components
        run: agent-bom code skills/ -f json -o code-scan.json || true
      - name: Audit skill definitions
        run: agent-bom skills scan skills/ -f json -o skills-audit.json --verbose || true
      - name: Scan filesystem for packages and CVEs
        run: agent-bom fs skills/ -f json -o fs-scan.json || true
      - name: Print results summary
        if: always()
        run: |
          echo "=== Code Scan ===" && cat code-scan.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
          echo "=== Skills Audit ===" && cat skills-audit.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
          echo "=== FS Scan ===" && cat fs-scan.json 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "No results"
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-bom-results
          path: |
            code-scan.json
            skills-audit.json
            fs-scan.json
          if-no-files-found: ignore

  validate-cloudformation:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install cfn-lint
      - run: cfn-lint skills/iam-departures-remediation/infra/cloudformation.yaml
      - run: cfn-lint skills/iam-departures-remediation/infra/cross_account_stackset.yaml

  validate-terraform:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"
      - run: cd skills/iam-departures-remediation/infra/terraform && terraform init -backend=false && terraform validate

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r skills/ -c pyproject.toml --severity-level medium || true
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA[A-Z0-9]\{16\}" skills/*/src/ --include="*.py" || exit 1
          ! grep -rn "sk-[a-zA-Z0-9]\{20,\}" skills/*/src/ --include="*.py" || exit 1
          ! grep -rn "ghp_[a-zA-Z0-9]\{36\}" skills/*/src/ --include="*.py" || exit 1
          echo "No hardcoded secrets found in source code"
