name: Setup Python And Deps
description: Set up Python with pip cache and install a scoped dependency set for a workflow job.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.11"
  packages:
    description: Space-delimited packages to install with pip.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install dependencies
      if: ${{ inputs.packages != '' }}
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        for attempt in 1 2 3; do
          if pip install ${{ inputs.packages }}; then
            exit 0
          fi
          if [ "$attempt" -eq 3 ]; then
            exit 1
          fi
          echo "pip install failed on attempt $attempt; retrying after transient network backoff" >&2
          sleep $((attempt * 5))
        done
